name: Windows Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (Windows)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
        continue-on-error: true

      - name: Prepare Windows Assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          # MSI 安装器
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            Copy-Item $msi.FullName (Join-Path release-assets $msi.Name)
            Write-Host "MSI copied: $($msi.Name)"
          } else {
            Write-Warning "No MSI found"
          }
          # 绿色版 exe
          $exeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            Copy-Item $exePath release-assets/
            Write-Host "EXE copied"
          } else {
            Write-Warning "EXE not found"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-windows
          path: release-assets/*
          if-no-files-found: error
